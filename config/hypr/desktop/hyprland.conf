# vim:ft=hyprlang

#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

autogenerated = 0 # remove this line to remove the warning

# See https://wiki.hyprland.org/Configuring/Monitors/
#monitor=,preferred,auto,auto

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
# exec-once = waybar & hyprpaper & firefox

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Some default env vars.
env = XCURSOR_SIZE,24

# Setup crash reporting
#env = HYPRLAND_TRACE,1

# Detect the monitor and set the right resolution
exec=~/.config/hypr/monitor-detect.sh

# Setup the right waybar depending on computer
exec-once=~/.config/hypr/waybar-detect.sh

# Setup udiskie to run on WM start
exec-once=~/.config/hypr/udiskie.sh

# Exec Needed Apps
exec-once=/usr/bin/dunst
exec-once=/usr/bin/solaar -w hide
exec-once=/usr/bin/openrgb --startminimized -p Default
exec-once=/usr/lib/polkit-kde-authentication-agent-1
exec-once=/usr/bin/killall qpwgraph || /usr/bin/sleep 5 && /usr/bin/qpwgraph -a -m
exec-once=/usr/bin/firefox
exec-once=/usr/bin/kitty --title Kitty
exec-once=/usr/bin/hyprpaper
# exec-once=mpvpaper -l background -o "no-audio --loop-playlist shuffle --fs --autofit=5120x1440 --panscan=1 --speed=0.5" DP-4 ~/backgrounds/night-time-over-lake.mp4
exec-once=systemctl --user start hyprland-session.target
#exec-shutdown=systemctl --user stop hyprland-session.target

# Lock screen after idle for 300s and turn monitors off after 330
exec-once=/usr/bin/hypridle | /usr/bin/systemd-cat -t hypridle

# Load xmodmap
exec-once = xmodmap ~/.Xmodmap

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = ALT
$ctrlMod = CONTROL

debug {
  disable_logs = false
}

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = no
        clickfinger_behavior = true
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 4
    gaps_out = 8,8,2,8
    border_size = 2
    col.active_border = rgba(3d59a1ee) rgba(7aa2f7ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = master
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 10

    blur {
        enabled = true
        size = 8
        passes = 1
        new_optimizations = true
        xray=true
        
    }

    shadow {
        enabled = true
        range = 5
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    orientation = center
    slave_count_for_center_master = 0
    new_status = master
    mfact = 0.5

    bind = $mainMod SHIFT, j, layoutmsg, swapnext
    bind = $mainMod SHIFT, k, layoutmsg, swapprev
    bind = $mainMod, j, layoutmsg, cyclenext
    bind = $mainMod, k, layoutmsg, cycleprev
    bind = $mainMod SHIFT, f, layoutmsg, swapwithmaster master
    bind = $mainMod SHIFT, l, layoutmsg, mfact .7


}


workspace = 1, persistent:true, monitor:DP-4 
workspace = 2, persistent:true, monitor:DP-4 
workspace = 3, persistent:true, monitor:DP-4 
workspace = 4, persistent:true, monitor:DP-4 
workspace = 5, persistent:true, monitor:DP-4 



misc {
    disable_hyprland_logo=true
    mouse_move_enables_dpms=true
    key_press_enables_dpms=false # disabled for testing
}


# Reset the orientation when working on laptop
workspace = 1, layoutopt:orientation:center
workspace = 2, layoutopt:orientation:center



# Put windows in the right workspaces
windowrule = workspace 1,match:class ^(firefox)$
windowrule = workspace 1,match:class ^(ffplay)$
windowrule = workspace 2,match:class ^(Alacritty)$
windowrule = workspace 2,match:title Kitty, match:class ^(kitty)$

# Make sure FFPlay does not allow the computer to sleep
windowrule = no_blur on,match:class ^(ffplay)$
windowrule = idle_inhibit always, match:class ^(ffplay)$
windowrule = opacity 1.0 override 1.0 override, match:class ^(ffplay)$
windowrule = tile on,match:class ^(ffplay)$

# Do not dim twitch
windowrule = no_blur on,match:title ^(.*Twitch.*)$
windowrule = idle_inhibit always,match:title ^(.*Twitch.*)$
windowrule = opacity 1.0 override 1.0 override, match:title ^(.*Twitch.*)$

# Do not dim teams
windowrule = no_blur on,match:title ^(.*Teams.*)$
windowrule = idle_inhibit always,match:title ^(.*Teams.*)$
windowrule = opacity 1.0 override 1.0 override, match:title ^(.*Teams.*)$

# Do not dim youtube
windowrule = no_blur on,match:title ^(.*YouTube.*)$
windowrule = idle_inhibit always,match:title ^(.*YouTube.*)$
windowrule = opacity 1.0 override 1.0 override, match:title ^(.*YouTube.*)$

# Do not dim Hearthstone
windowrule = no_blur on,match:title ^(.*Hearthstone.*)$
windowrule = idle_inhibit always,match:title ^(.*Hearthstone.*)$
windowrule = opacity 1.0 override 1.0 override, match:title ^(.*Hearthstone.*)$
windowrule = tile on, match:title ^(.*Hearthstone.*)$

# Battle.net
windowrule = no_blur on,match:title ^(.*Battle\.net.*)$
windowrule = idle_inhibit always,match:title ^(.*Battle\.net.*)$
windowrule = opacity 1.0 override 1.0 override, match:title ^(.*Battle\.net.*)$
windowrule = tile on, match:title ^(.*Battle\.net.*)$

# No idle or dim with discord
windowrule = idle_inhibit always,match:title ^(.*Murder\sParty.*)$
windowrule = opacity 1.0 override 1.0 override, match:title ^(.*Murder\sParty.*)$

# Do not dim timberborn
windowrule = no_blur on,match:title ^(.*Timberborn.*)$
windowrule = idle_inhibit always,match:title ^(.*Timberborn.*)$
windowrule = opacity 1.0 override 1.0 override, match:title ^(.*Timberborn.*)$
windowrule = tile on, match:title ^(.*Timberborn.*)$


# Float qprompt
windowrule = workspace 1, match:class ^(com.cuperino.qprompt)$
windowrule = float on, match:class ^(com.cuperino.qprompt)$
windowrule = move 1600 0, match:class ^(com.cuperino.qprompt)$
windowrule = size 1920 20%, match:class ^(com.cuperino.qprompt)$
windowrule = no_dim on, match:class ^(com.cuperino.qprompt)$
windowrule = opacity 1.0 override 1.0 override, match:class ^(com.cuperino.qprompt)$

# Window Rules for obsidian
windowrule = tag +obsidian, match:class ^(.*[oO]bsidian.*)$
windowrule = tag +obsidian, match:title ^(.*[oO]bsidian.*)$
windowrule = no_blur on,match:tag obsidian
windowrule = opacity 1.0 override 1.0 override, match:tag obsidian
windowrule = workspace 3,match:tag obsidian

# Firefox PIP
windowrule = no_initial_focus on, match:title ^(Picture\-in\-Picture)$
windowrule = idle_inhibit always, match:title ^(Picture\-in\-Picture)$
windowrule = opacity 1.0 override 1.0 override, match:title ^(Picture\-in\-Picture)$
windowrule = tile on, match:title ^(Picture\-in\-Picture)$

# Legend of Zelda
windowrule = size 1920 1080, match:title ^(The Legend of Zelda).*$
windowrule = no_dim on, match:title ^(The Legend Of Zelda)$
windowrule = opacity 1.0 override 1.0 override, match:title ^(The Legend Of Zelda)$

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
#bind = $mainMod, RETURN, exec, alacritty
bind = $mainMod, RETURN, exec, kitty --title Kitty
bind = $mainMod SHIFT, C, killactive
bind = $mainMod $ctrlMod, Q, exit
bind = $mainMod SHIFT, V, togglefloating 
bind = $mainMod, P, exec, wofi --style ~/.config/wofi/style.css --show drun#combi --modi combi,calc --allow-images

# Bind a printscreen button to take screenshots
bind = $mainMod, PRINT, exec, hyprshot -m region --clipboard-only 

# Float Firefox Window and Set size
bind = $mainMod, o, setfloating, active
bind = $mainMod, o, resizeactive, exact 1920 1080
bind = $mainMod, o, moveactive, exact 1600 300

# Reset Firefox window
bind = $mainMod SHIFT, o, settiled, active 

# Move workspace left and right
bind = $ctrlMod, left, workspace, e-1
bind = $ctrlMod, right, workspace, e+1

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Alt Tab
bind = ALT, tab, cyclenext

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10


# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Bindings that allow for zooming
bind = $ctrlMod, mouse_down, exec, \
  hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | \
  awk '/^float/ { print $2 * 1.5 }')

bind = $ctrlMod, mouse_up, exec, \
  hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | \
  awk '/^float/ { new = $2 * 0.5; if (new < 1) new = 1; print new;}')
